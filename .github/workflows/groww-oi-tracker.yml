name: GROWW OI Tracker

on:
  workflow_dispatch:
  schedule:
    # Run at 9:30 AM UTC (3:00 PM IST), Mon-Fri
    - cron: '30 3 * * 1-5'
    # Run at 11:30 AM UTC (5:00 PM IST), Mon-Fri
    - cron: '30 5 * * 1-5'
    # Run at 1:30 PM UTC (7:00 PM IST), Mon-Fri
    - cron: '30 7 * * 1-5'
    # Run at 3:00 PM UTC (8:30 PM IST), Mon-Fri
    - cron: '0 9 * * 1-5'

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create Groww credentials
        run: |
          echo "" > TEST.TXT
          echo "${{ secrets.GROWW_API_KEY }}" >> TEST.TXT
          echo "" >> TEST.TXT
          echo "" >> TEST.TXT
          echo "" >> TEST.TXT
          echo "${{ secrets.GROWW_SECRET }}" >> TEST.TXT
      
      - name: Create Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
      
      - name: Run OI Tracker
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_SECRET: ${{ secrets.GROWW_SECRET }}
          GROWW_API_KEY_2: ${{ secrets.GROWW_API_KEY_2 }}
          GROWW_SECRET_2: ${{ secrets.GROWW_SECRET_2 }}
        run: python TEST.PY
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oi-data-${{ github.run_id }}
          path: GROWW_OI_Export.csv
          retention-days: 30
